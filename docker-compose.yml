services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meetmind_postgres
    environment:
      POSTGRES_USER: meetmind
      POSTGRES_PASSWORD: meetmind_dev
      POSTGRES_DB: meetmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetmind -d meetmind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
